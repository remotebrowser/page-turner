# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      demo:
        description: Deploy page-turner (demo)
        required: false
        type: boolean
        default: true
      lambda:
        description: Deploy page-turner-lambda
        required: false
        type: boolean
        default: true

jobs:
  prepare-matrix:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.pm.outputs.matrix }}
    steps:
      - id: pm
        uses: remotebrowser/shared-github-actions/prepare-matrix@v1
        with:
          entries: |
            { "env": "demo",   "config": "demo",   "app_name": "page-turner",        "fly_toml": "fly.toml"        }
            { "env": "lambda", "config": "lambda", "app_name": "page-turner-lambda", "fly_toml": "fly.lambda.toml" }
          selections: |
            ${{ inputs.demo   && 'demo'   || '' }}
            ${{ inputs.lambda && 'lambda' || '' }}
          key-field: env

  deploy:
    needs: prepare-matrix
    name: Deploy ${{ matrix.app_name }}
    runs-on: ubuntu-22.04
    concurrency: deploy-${{ matrix.app_name }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: remotebrowser/shared-github-actions/deploy-fly@v1
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          doppler-project: page-turner
          doppler-config: ${{ matrix.config }}
          app-name: ${{ matrix.app_name }}
          fly-toml: ${{ matrix.fly_toml }}
